services:
  app:
    build:
      context: .
      args:
       PORT: ${PORT}
    ports:
      - "${PORT}:${PORT}"
    container_name: app
    env_file:
      - .env
    volumes:
      - ./gin-backend-starter:/app/gin-backend-starter
    depends_on:
      - database

  database:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: ${DATABASE_NAME}
    volumes:
      - db_data:/data/db

volumes:
  db_data:
