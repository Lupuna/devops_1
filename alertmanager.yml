global:
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'telegram'
  group_by: ['alertname']
  repeat_interval: 5m
  group_interval: 5m

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: 'SECRET'
        chat_id: -1003776336068
        parse_mode: HTML
        send_resolved: true
        message: '{{ template "telegram.default" . }}'