global:
  scrape_interval: 10s

rule_files:
 - 'alert-rules.yml'

scrape_configs:
  - job_name: "gin-backend-starter"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:4000"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "prometheus"
    static_configs:
      - targets: [ "prometheus:9090" ]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']